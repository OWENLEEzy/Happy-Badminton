<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Feather skirt -->
  <path d="M16 23.5 C13 17 6.5 12 8.2 3.8 C9.2 -0.2 22.8 -0.2 23.8 3.8 C25.5 12 19 17 16 23.5Z"
        fill="#FAFAFA" stroke="#1A1A1A" stroke-width="1.4"/>
  <!-- Rim oval at the top -->
  <ellipse cx="16" cy="3.8" rx="7.8" ry="2.3" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
  <!-- Feather spines: 7 lines from rim edge down to cork attach point -->
  <line x1="8.2"  y1="3.8" x2="16" y2="23" stroke="#C0C0C0" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="11"   y1="1.8" x2="16" y2="23" stroke="#C0C0C0" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="13.5" y1="1.0" x2="16" y2="23" stroke="#C0C0C0" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="16"   y1="0.8" x2="16" y2="23" stroke="#C0C0C0" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="18.5" y1="1.0" x2="16" y2="23" stroke="#C0C0C0" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="21"   y1="1.8" x2="16" y2="23" stroke="#C0C0C0" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="23.8" y1="3.8" x2="16" y2="23" stroke="#C0C0C0" stroke-width="0.85" stroke-linecap="round"/>
  <!-- Cork cylinder -->
  <rect x="13.5" y="22.5" width="5" height="5.5" rx="1.3" fill="#F5C418" stroke="#1A1A1A" stroke-width="1.4"/>
  <!-- Cork base dome -->
  <ellipse cx="16" cy="28" rx="2.5" ry="1.6" fill="#C99610" stroke="#1A1A1A" stroke-width="1.4"/>
</svg>
